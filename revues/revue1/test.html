<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RogerRover2026 - L'Odyssée Spatiale des Jeunes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #070a13; color: #e2e8f0; }
        h1, h2, h3 { font-family: 'Orbitron', sans-serif; }
        .gradient-text { background: linear-gradient(to right, #00f0ff, #bd00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
    <script>
        // Vérification immédiate de la session
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
            if (!user) {
                window.location.href = "/"; // Redirection forcée vers l'accueil si non identifié
            }
            });
        }
        </script>
</head>
<body class="min-h-screen">
    <nav class="p-6 flex justify-between items-center">
        <div class="text-2xl font-bold tracking-tighter text-white">ROGER<span class="text-cyan-400">ROVER</span>2026</div>
        <div class="space-x-6 text-sm uppercase tracking-widest">
            <a href="#" class="hover:text-cyan-400">Le Projet</a>
            <a href="#" class="hover:text-cyan-400">Mission</a>
            <button onclick="netlifyIdentity.open('login')">Connexion</button>
        </div>
        <div data-netlify-identity-menu></div>
    </nav>

    <main class="max-w-5xl mx-auto mt-12 p-6">
       Ici la revue 1
       <p>nous sommes parés</p>
    </main>

</body>
</html>
